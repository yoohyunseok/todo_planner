<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024" />
  <title>플래너</title>
  <style>
    /* ── 디자인 토큰 ── */
    :root {
      --bg:               #eef2f7;
      --surface:          #ffffff;
      --border:           #e2e8f0;
      --border-subtle:    #edf0f5;
      --text:             #1a2638;
      --text-sub:         #5a6a82;
      --text-muted:       #95a3b8;
      --primary:          #3d6ce7;
      --primary-dk:       #2e5bcc;
      --primary-pale:     #eff4ff;
      --danger:           #e53e3e;
      --danger-bg:        #fff5f5;
      --success:          #0ea672;
      --success-bg:       #f0fdf8;
      --warn:             #d97706;
      --warn-bg:          #fffbeb;
      --sel-color:        #7c3aed;
      --dash-border:      #e4eaf4;
      --r:                10px;
      --r-sm:             6px;
      --r-pill:           999px;
      --shadow:           0 1px 3px rgba(26,38,56,.06), 0 1px 2px rgba(26,38,56,.04);
      --shadow-up:        0 4px 16px rgba(26,38,56,.10), 0 2px 4px rgba(26,38,56,.05);
      --shadow-card:      0 2px 8px rgba(26,38,56,.07), 0 1px 2px rgba(26,38,56,.04);
      --tr:               0.15s ease;

      --deadline-soon:    #f59e0b;
      --deadline-overdue: #ef4444;
      --deadline-ok:      #3b82f6;
      --card-bg:          #ffffff;
      --card-shadow:      0 2px 8px rgba(0,0,0,.08);

      /* Calendar-specific additions */
      --cal-cell-bg:      #ffffff;
      --cal-cell-hover:   #f5f8ff;
      --cal-cell-radius:  8px;
      --cal-chip-r:       var(--r-pill);
      --cal-today-ring:   rgba(61,108,231,.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo',
                   Roboto, 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ═══════════════════════════════
       HEADER
    ═══════════════════════════════ */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      white-space: nowrap;
    }

    #progress-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    #progress-label {
      font-size: 0.75rem;
      color: var(--text-sub);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    #progress-track {
      width: 120px;
      height: 5px;
      background: var(--border);
      border-radius: var(--r-pill);
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: var(--primary);
      border-radius: var(--r-pill);
      transition: width 0.45s ease, background-color 0.45s ease;
    }

    #progress-fill.complete { background: var(--success); }

    /* ═══════════════════════════════
       DASHBOARD
    ═══════════════════════════════ */
    #dashboard {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px 14px;
    }

    #dash-inner {
      max-width: 760px;
      margin: 0 auto;
    }

    #today-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    #today-date-text {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-sub);
      letter-spacing: 0.01em;
    }

    #today-bar-line {
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }

    #stat-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1.5px solid var(--dash-border);
      border-radius: var(--r);
      padding: 12px 14px 11px;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 0;
      position: relative;
      overflow: hidden;
      transition: box-shadow var(--tr);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--border);
      transition: background var(--tr);
    }

    .stat-card.stat-neutral::before  { background: #94a3b8; }
    .stat-card.stat-success::before  { background: var(--success); }
    .stat-card.stat-warn::before     { background: var(--warn); }
    .stat-card.stat-danger::before   { background: var(--danger); }

    .stat-card-icon {
      font-size: 1rem;
      line-height: 1;
      margin-bottom: 1px;
    }

    .stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      transition: color var(--tr);
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-sub);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-card.stat-warn  .stat-num  { color: var(--warn); }
    .stat-card.stat-danger .stat-num { color: var(--danger); }

    #cat-section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    #cat-bars {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .cat-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cat-badge-mini {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--r-pill);
      flex-shrink: 0;
      width: 38px;
      text-align: center;
    }

    .cat-badge-mini.업무 { background: #dbeafe; color: #1e40af; }
    .cat-badge-mini.개인 { background: #d1fae5; color: #065f46; }
    .cat-badge-mini.공부 { background: #ede9fe; color: #5b21b6; }

    .cat-bar-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      width: 54px;
      flex-shrink: 0;
    }

    .cat-bar-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: var(--r-pill);
      overflow: hidden;
    }

    .cat-bar-fill {
      height: 100%;
      border-radius: var(--r-pill);
      transition: width 0.45s ease;
    }

    .cat-bar-fill.업무 { background: #60a5fa; }
    .cat-bar-fill.개인 { background: #34d399; }
    .cat-bar-fill.공부 { background: #a78bfa; }

    .cat-bar-pct {
      font-size: 0.7rem;
      color: var(--text-muted);
      width: 30px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ═══════════════════════════════
       INPUT AREA
    ═══════════════════════════════ */
    #input-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #input-area {
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #todo-input,
    #category-select {
      padding: 9px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      background: var(--surface);
      transition: border-color var(--tr), box-shadow var(--tr);
      outline: none;
    }

    #todo-input {
      flex: 1;
      min-width: 160px;
    }

    #todo-input::placeholder { color: var(--text-muted); }

    .deadline-field {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 0 10px;
      background: var(--surface);
      flex-shrink: 0;
      transition: border-color var(--tr), box-shadow var(--tr);
      cursor: text;
    }

    .deadline-field:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(61,108,231,.15);
    }

    .deadline-field-icon {
      font-size: 0.85rem;
      color: var(--text-muted);
      pointer-events: none;
      user-select: none;
      flex-shrink: 0;
    }

    .deadline-field-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      pointer-events: none;
    }

    #deadline-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--text-sub);
      padding: 9px 0;
      width: 126px;
      cursor: pointer;
    }

    #todo-input:focus,
    #category-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(61,108,231,.15);
    }

    #todo-input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,.12);
    }

    #add-btn {
      padding: 9px 20px;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--r);
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--tr), box-shadow var(--tr), transform 0.1s;
      flex-shrink: 0;
    }

    #add-btn:hover  { background: var(--primary-dk); box-shadow: 0 3px 12px rgba(61,108,231,.38); }
    #add-btn:active { transform: translateY(1px); box-shadow: none; }
    #add-btn:focus-visible { outline: 3px solid rgba(61,108,231,.4); outline-offset: 2px; }

    #hint-text {
      display: none;
      font-size: 0.78rem;
      color: var(--danger);
      padding: 0 24px 10px;
      width: 100%;
    }

    #auto-cat-badge {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #ede9fe;
      color: #5b21b6;
      border-radius: var(--r-pill);
      white-space: nowrap;
      flex-shrink: 0;
      cursor: default;
      user-select: none;
    }

    #auto-cat-badge.visible { display: flex; }

    /* ═══════════════════════════════
       FILTER + SORT + VIEW TOGGLE  (v2: single row)
    ═══════════════════════════════ */
    #filter-sort-wrap {
      max-width: 760px;
      margin: 14px auto 0;
      padding: 0 24px;
    }

    /* Single unified bar: view-toggle | divider | filters | spacer | sort */
    #filter-area {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* View toggle pills — inline left of filter row */
    #view-toggle {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }

    .view-btn {
      padding: 5px 13px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: var(--r-pill);
      cursor: pointer;
      background: var(--surface);
      color: var(--text-sub);
      transition: background var(--tr), color var(--tr), border-color var(--tr);
      outline: none;
      white-space: nowrap;
    }

    .view-btn:hover { background: #f4f7fc; border-color: #c8d3e8; }
    .view-btn:focus-visible { box-shadow: 0 0 0 3px rgba(61,108,231,.2); }

    .view-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* Thin vertical divider between view-toggle and filter buttons */
    .filter-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 2px;
    }

    .filter-btn {
      padding: 5px 14px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: var(--r-pill);
      cursor: pointer;
      background: var(--surface);
      color: var(--text-sub);
      transition: background var(--tr), color var(--tr), border-color var(--tr);
      outline: none;
      white-space: nowrap;
    }

    .filter-btn:hover { background: #f4f7fc; border-color: #c8d3e8; }
    .filter-btn:focus-visible { box-shadow: 0 0 0 3px rgba(61,108,231,.2); }

    .filter-btn.active[data-filter="all"]  { background: #1a2638; color: #fff; border-color: #1a2638; }
    .filter-btn.active[data-filter="업무"] { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    .filter-btn.active[data-filter="개인"] { background: #059669; color: #fff; border-color: #059669; }
    .filter-btn.active[data-filter="공부"] { background: #6d28d9; color: #fff; border-color: #6d28d9; }

    #filter-spacer { flex: 1; min-width: 8px; }

    #sort-pills {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .sort-pill {
      padding: 4px 11px;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: var(--r-pill);
      cursor: pointer;
      background: var(--surface);
      color: var(--text-muted);
      transition: background var(--tr), color var(--tr), border-color var(--tr);
      outline: none;
      white-space: nowrap;
    }

    .sort-pill:hover { background: #f4f7fc; border-color: #c8d3e8; color: var(--text-sub); }
    .sort-pill:focus-visible { box-shadow: 0 0 0 3px rgba(61,108,231,.2); }

    .sort-pill.active {
      background: var(--primary-pale);
      border-color: rgba(61,108,231,.35);
      color: var(--primary);
      font-weight: 600;
    }

    /* ═══════════════════════════════
       CALENDAR AREA  (v2 polish)
    ═══════════════════════════════ */
    #calendar-area {
      display: none;
      max-width: 760px;
      margin: 14px auto 0;
      padding: 0 24px;
      opacity: 1;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #calendar-area.view-entering {
      opacity: 0;
      transform: translateY(6px);
    }

    /* Calendar card */
    #calendar-container {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 20px 20px 16px;
      box-shadow: var(--shadow-card);
      overflow-x: auto;
    }

    /* ── Navigation bar ── */
    #calendar-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    #cal-title {
      font-size: 1.05rem;
      font-weight: 800;
      flex: 1;
      text-align: center;
      color: var(--text);
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    /* Icon-style prev/next buttons */
    .cal-nav-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      background: var(--surface);
      color: var(--text-sub);
      transition: background var(--tr), border-color var(--tr), color var(--tr), box-shadow var(--tr);
      outline: none;
      flex-shrink: 0;
      line-height: 1;
    }

    .cal-nav-btn:hover {
      background: var(--primary-pale);
      border-color: rgba(61,108,231,.4);
      color: var(--primary);
      box-shadow: 0 0 0 3px var(--cal-today-ring);
    }
    .cal-nav-btn:focus-visible { box-shadow: 0 0 0 3px rgba(61,108,231,.2); }

    /* "오늘" pill button — secondary action style */
    .cal-nav-btn.today-btn {
      width: auto;
      border-radius: var(--r-pill);
      padding: 0 14px;
      font-size: 0.78rem;
      font-weight: 600;
      border-color: rgba(61,108,231,.35);
      color: var(--primary);
    }

    .cal-nav-btn.today-btn:hover {
      background: var(--primary-pale);
      box-shadow: 0 0 0 3px var(--cal-today-ring);
    }

    /* Month count summary line */
    #cal-month-summary {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
      min-height: 1em;
    }

    /* ── Calendar grid ── */
    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      min-width: 420px;
    }

    .cal-header-cell {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      padding: 4px 0 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Sunday: muted red, Saturday: muted blue */
    .cal-header-cell:first-child { color: #e47272; }
    .cal-header-cell:last-child  { color: #6da4d4; }

    /* ── Day cell ── */
    .cal-cell {
      background: var(--cal-cell-bg);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--cal-cell-radius);
      padding: 8px 7px 6px;
      min-height: 80px;
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr), box-shadow var(--tr), transform 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .cal-cell:hover {
      background: var(--cal-cell-hover);
      border-color: #c8d8f5;
      box-shadow: 0 3px 10px rgba(61,108,231,.1);
      transform: translateY(-1px);
    }

    /* Other-month cells: faded, no interaction */
    .cal-cell--other-month {
      opacity: 0.28;
      pointer-events: none;
      background: transparent;
      border-color: transparent;
    }

    /* Today: primary circle on day number, tinted background */
    .cal-cell--today {
      background: var(--primary-pale);
      border-color: rgba(61,108,231,.3);
    }

    .cal-cell--today:hover {
      background: #e6efff;
      border-color: rgba(61,108,231,.5);
    }

    .cal-cell--today .cal-day-num {
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 3px var(--cal-today-ring);
    }

    /* Overdue: very subtle left red accent only */
    .cal-cell--overdue {
      border-left: 2.5px solid #f9a8a8;
    }

    /* Selected cell */
    .cal-cell--selected {
      background: var(--primary-pale) !important;
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 2px rgba(61,108,231,.2) !important;
      transform: none !important;
    }

    /* Day number */
    .cal-day-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 5px;
      display: block;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    /* Sunday/Saturday day number color */
    .cal-cell--sun .cal-day-num { color: #e47272; }
    .cal-cell--sat .cal-day-num { color: #6da4d4; }

    /* Today override: white number in circle regardless of day-of-week */
    .cal-cell--today.cal-cell--sun .cal-day-num,
    .cal-cell--today.cal-cell--sat .cal-day-num { color: #fff; }

    /* ── Task chips — pill shape ── */
    .cal-chip {
      font-size: 0.63rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: var(--cal-chip-r);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      max-width: 100%;
      line-height: 1.4;
      transition: opacity var(--tr);
    }

    .cal-chip.cat-업무 { background: #dbeafe; color: #1e40af; }
    .cal-chip.cat-개인 { background: #d1fae5; color: #065f46; }
    .cal-chip.cat-공부 { background: #ede9fe; color: #5b21b6; }

    /* Completed: strikethrough + fade */
    .cal-chip.completed {
      opacity: 0.45;
      text-decoration: line-through;
    }

    /* "+N more" label */
    .cal-more {
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-top: 2px;
      display: block;
      letter-spacing: 0.01em;
    }

    /* Overdue dot indicator top-right */
    .cal-overdue-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--danger);
      opacity: 0.75;
      flex-shrink: 0;
    }

    .cal-cell:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* ── View fade transition ── */
    #list-area {
      max-width: 760px;
      margin: 14px auto 56px;
      padding: 0 24px;
      transition: opacity 0.18s ease;

    /* ═══════════════════════════════

      gap: 8px;
      margin-bottom: 10px;

      margin-left: auto;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: var(--r-pill);
      background: var(--surface);
      color: var(--text-sub);
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr);

    .btn-sel-enter:hover { background: #f4f7fc; border-color: #c8d3e8; }

    #sel-active {

      width: 100%;

      border-radius: var(--r);
      padding: 7px 12px;

      position: relative;
      width: 19px;
      height: 19px;
      border: 2px solid #c4b5fd;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color var(--tr), background var(--tr);

    .sel-check:hover { border-color: var(--sel-color); }

    .sel-check.checked {
      background: var(--sel-color);
      border-color: var(--sel-color);
    }

    .sel-check.checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .sel-check.indeterminate {
      background: var(--sel-color);
      border-color: var(--sel-color);
    }

    .sel-check.indeterminate::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 2px;
      background: #fff;
      border-radius: 1px;

      font-family: inherit;

      color: var(--danger);
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--tr), opacity var(--tr);

      font-weight: 500;

      color: var(--text-sub);

      transition: background var(--tr);

    ═══════════════════════════════ */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .todo-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 11px;
      box-shadow: var(--shadow);
      transition: box-shadow var(--tr), transform var(--tr), background var(--tr), border-color var(--tr);

    .todo-item.selected {
      background: #f5f3ff;
      border-color: #c4b5fd;
    }

    .todo-item.selecting:hover { background: #faf5ff; }
    .todo-item.selecting.selected:hover { background: #ede9fe; }

    .todo-item[data-category="업무"] { border-left: 3px solid #60a5fa; }

    .todo-item[data-category="공부"] { border-left: 3px solid #a78bfa; }

    .todo-item.selected[data-category="업무"],
    .todo-item.selected[data-category="개인"],
    .todo-item.selected[data-category="공부"] { border-left-color: var(--sel-color); }

    .todo-item.overdue   { border-left-color: var(--deadline-overdue) !important; background: var(--danger-bg); }
    .todo-item.due-today { border-left-color: var(--deadline-soon)    !important; background: var(--warn-bg); }

    .todo-checkbox {
      position: relative;
      width: 19px; height: 19px;
      border: 2px solid #cbd5e1;
      border-radius: 5px;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color var(--tr), background var(--tr);

    .todo-checkbox:hover       { border-color: var(--primary); }
    .todo-checkbox.checked     { background: var(--primary); border-color: var(--primary); }

    .todo-checkbox.checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .todo-item.completed { opacity: 0.52; }
    .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-muted); }

    .todo-text {
      flex: 1;
      font-size: 0.9rem;
      line-height: 1.45;
      word-break: break-word;
    }

    .category-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }

    .category-badge.업무 { background: #dbeafe; color: #1e40af; }
    .category-badge.개인 { background: #d1fae5; color: #065f46; }
    .category-badge.공부 { background: #ede9fe; color: #5b21b6; }

    .deadline-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .deadline-overdue {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
    }

    .deadline-today {
      background: #fef3c7;
      color: #b45309;
      border: 1px solid #fcd34d;
    }

    .deadline-ok {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    .deadline-completed {
      background: #f1f5f9;
      color: #94a3b8;
      border: 1px solid #e2e8f0;

    .todo-actions { display: flex; gap: 5px; flex-shrink: 0; }

    @media (hover: hover) {

    .btn-edit, .btn-delete, .btn-save, .btn-cancel {
      padding: 4px 10px;
      font-size: 0.74rem;
      font-family: inherit;
      font-weight: 500;
      border-radius: var(--r-sm);
      cursor: pointer;
      background: transparent;
      border: 1.5px solid;

    .btn-delete { color: var(--danger); border-color: var(--danger); }

    .btn-save   { color: var(--success); border-color: var(--success); }

    .btn-cancel { color: var(--text-sub); border-color: var(--border); }

    .edit-input {
      flex: 1;
      min-width: 0;
      padding: 6px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      border: 1.5px solid var(--primary);
      border-radius: var(--r-sm);

      box-shadow: 0 0 0 3px rgba(61,108,231,.15);

    .edit-select,

      padding: 6px 8px;
      font-size: 0.84rem;
      font-family: inherit;
      border: 1.5px solid var(--border);

    #cal-date-filter-bar {
      display: none;
      align-items: center;

    /* ── reduced motion ── */
    @media (prefers-reduced-motion: reduce) {

      .cat-bar-fill { transition: none !important; }
      #calendar-area { transition: none !important; }
      #list-area { transition: none !important; }
    }
  </style>
</head>

    function detectCategory(text) {
      if (!text) return null;
      var scores = { '업무': 0, '개인': 0, '공부': 0 };
      Object.keys(KEYWORD_MAP).forEach(function(cat) {
        KEYWORD_MAP[cat].forEach(function(kw) {
          if (text.indexOf(kw) !== -1) scores[cat]++;
        });
      });
      var best = null, top = 0;
      Object.keys(scores).forEach(function(cat) {
        if (scores[cat] > top) { top = scores[cat]; best = cat; }
      });
      return best;
    }

    /* ── 날짜 헬퍼 ── */

    function getTodayStr() {
      var d   = new Date();
      var y   = d.getFullYear();
      var m   = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function daysUntil(dateStr) {
      var today   = new Date(getTodayStr() + 'T00:00:00');
      var target  = new Date(dateStr        + 'T00:00:00');
      return Math.round((target - today) / 86400000);
    }

    function dateStrFromParts(y, m, d) {
      /* Returns "YYYY-MM-DD" from numeric year, 1-based month, day */
      return y + '-' +
        String(m).padStart(2, '0') + '-' +
        String(d).padStart(2, '0');
    }

    var DEADLINE_RE = /^\d{4}-\d{2}-\d{2}$/;

    function isValidDeadline(v) {
      return typeof v === 'string' && DEADLINE_RE.test(v);
    }

    /* ── Supabase API ── */

    function sbFetch() {
      return fetch(SUPABASE_URL + '/rest/v1/tasks?select=*&order=created_at.asc', {
        headers: SB_HEADERS,
      }).then(function(r) { return r.json(); })
        .then(function(rows) {
          return rows.map(function(r) {
            return {
              id:        r.id,
              text:      r.text,
              category:  r.category,
              completed: r.completed,
              createdAt: r.created_at,
              deadline:  r.deadline || null,
            };
          });
        });
    }

    function sbInsert(todo) {
      fetch(SUPABASE_URL + '/rest/v1/tasks', {
        method:  'POST',
        headers: Object.assign({}, SB_HEADERS, { 'Prefer': 'return=minimal' }),
        body: JSON.stringify({
          id:         todo.id,
          text:       todo.text,
          category:   todo.category,
          completed:  todo.completed,
          created_at: todo.createdAt,
          deadline:   todo.deadline,
        }),
      });
    }

    function sbUpdate(id, fields) {
      fetch(SUPABASE_URL + '/rest/v1/tasks?id=eq.' + id, {
        method:  'PATCH',
        headers: Object.assign({}, SB_HEADERS, { 'Prefer': 'return=minimal' }),
        body: JSON.stringify(fields),
      });
    }

    function sbDelete(id) {
      fetch(SUPABASE_URL + '/rest/v1/tasks?id=eq.' + id, {
        method:  'DELETE',
        headers: SB_HEADERS,
      });
    }

    function sbDeleteMany(ids) {
      if (!ids.length) return;
      fetch(SUPABASE_URL + '/rest/v1/tasks?id=in.(' + ids.join(',') + ')', {
        method:  'DELETE',
        headers: SB_HEADERS,
      });

    function sanitize(data) {
      if (!Array.isArray(data)) return [];
      return data
        .filter(function(t) {
          return t != null
            && typeof t.id   === 'string' && t.id   !== ''
            && typeof t.text === 'string' && t.text.trim() !== '';
        })
        .map(function(t) {
          return {
            id:        t.id,
            text:      String(t.text).slice(0, 200),
            category:  VALID_CATS.indexOf(t.category) !== -1 ? t.category : '개인',
            completed: Boolean(t.completed),
            createdAt: typeof t.createdAt === 'string' ? t.createdAt : new Date().toISOString(),
            deadline:  isValidDeadline(t.deadline) ? t.deadline : null,
          };
        });
    }

    /* ── 정렬 ── */

    function sortTodos(list) {
      var copy = list.slice();
      if (activeSort === 'deadline') {
        copy.sort(function(a, b) {
          if (a.deadline && b.deadline) {
            if (a.deadline < b.deadline) return -1;
            if (a.deadline > b.deadline) return 1;
            return a.createdAt < b.createdAt ? -1 : 1;
          }
          if (a.deadline && !b.deadline) return -1;
          if (!a.deadline && b.deadline) return 1;
          return a.createdAt > b.createdAt ? -1 : 1;
        });
      } else if (activeSort === 'category') {
        copy.sort(function(a, b) {
          if (a.category < b.category) return -1;
          if (a.category > b.category) return 1;
          return a.createdAt > b.createdAt ? -1 : 1;
        });
      } else {
        copy.sort(function(a, b) {
          return a.createdAt > b.createdAt ? -1 : 1;
        });
      }
      return copy;
    }

        return todos.filter(function(t) {

          var dateMatch = t.deadline === selectedCalDate;
          return catMatch && dateMatch;

        ? todos
        : todos.filter(function(t) { return t.category === activeFilter; });

    /* ── 대시보드 업데이트 (single-pass O(n)) ── */

    function updateDashboard() {
      var today = getTodayStr();

      var totalCount   = 0;
      var doneToday    = 0;
      var soonCount    = 0;
      var overdueCount = 0;
      var cats = {
        '업무': { total: 0, done: 0 },
        '개인': { total: 0, done: 0 },
        '공부': { total: 0, done: 0 },
      };

      todos.forEach(function(t) {
        totalCount++;

        if (t.completed) {
          var createdDay = t.createdAt.slice(0, 10);
          if (createdDay === today) doneToday++;
        }

        if (!t.completed && t.deadline) {
          var days = daysUntil(t.deadline);
          if (days < 0) {
            overdueCount++;
          } else if (days <= 3) {
            soonCount++;
          }
        }

        var c = cats[t.category];
        if (c) {
          c.total++;
          if (t.completed) c.done++;
        }
      });

      document.getElementById('stat-total-num').textContent   = totalCount;
      document.getElementById('stat-done-num').textContent    = doneToday;
      document.getElementById('stat-soon-num').textContent    = soonCount;
      document.getElementById('stat-overdue-num').textContent = overdueCount;

      var soonCard = document.getElementById('stat-soon');
      soonCard.className = 'stat-card';
      if (soonCount > 0) soonCard.classList.add('stat-warn');

      var overdueCard = document.getElementById('stat-overdue');
      overdueCard.className = 'stat-card';
      if (overdueCount > 0) overdueCard.classList.add('stat-danger');

      VALID_CATS.forEach(function(cat) {
        var c   = cats[cat];
        var pct = c.total === 0 ? 0 : Math.round(c.done / c.total * 100);
        document.getElementById('bar-' + cat).style.width  = pct + '%';
        document.getElementById('pct-' + cat).textContent  = pct + '%';

        var track = document.querySelector('[aria-label="' + cat + ' 진행률"]');
        if (track) track.setAttribute('aria-valuenow', String(pct));
      });
    }

    function buildDeadlineBadge(deadline, completed) {

        badge.setAttribute('aria-label', '마감일: ' + deadline);
        return badge;

      var days = daysUntil(deadline);
      var parts = deadline.split('-');
      var mmdd  = parseInt(parts[1], 10) + '월 ' + parseInt(parts[2], 10) + '일';

      if (days < 0) {
        badge.classList.add('deadline-overdue');
        badge.textContent = 'D+' + Math.abs(days);
        badge.setAttribute('aria-label', '기한 초과: ' + Math.abs(days) + '일 경과');
      } else if (days === 0) {
        badge.classList.add('deadline-today');
        badge.textContent = '오늘 마감';
        badge.setAttribute('aria-label', '오늘 마감');
      } else if (days <= 3) {
        badge.classList.add('deadline-today');
        badge.textContent = 'D-' + days;
        badge.setAttribute('aria-label', '마감일까지 ' + days + '일');
      } else {
        badge.classList.add('deadline-ok');
        badge.textContent = mmdd;
        badge.setAttribute('aria-label', '마감일: ' + mmdd);
      }

      return badge;
    }

    /* ═══════════════════════════════════════════════════════
       CALENDAR FUNCTIONS
    ═══════════════════════════════════════════════════════ */

    /**
     * getCalendarDays(year, month)
     * Returns 35 or 42 day-descriptor objects for the calendar grid.
     * month is 0-indexed (JS convention).
     */
    function getCalendarDays(year, month) {
      var today = getTodayStr();

      /* Build a Map from "YYYY-MM-DD" → array of todos for O(n) lookup */
      var deadlineMap = {};
      todos.forEach(function(t) {
        if (t.deadline) {
          if (!deadlineMap[t.deadline]) deadlineMap[t.deadline] = [];
          deadlineMap[t.deadline].push(t);
        }
      });

      /* First day of this month and its weekday (0=Sun) */
      var firstOfMonth = new Date(year, month, 1);
      var startDow     = firstOfMonth.getDay();   /* 0 = Sunday */

      /* Days in this month */
      var daysInMonth  = new Date(year, month + 1, 0).getDate();

      /* Days in previous month (for padding) */
      var daysInPrevMonth = new Date(year, month, 0).getDate();

      /* Total cells: always 35 or 42 */
      var totalCells = startDow + daysInMonth;
      totalCells     = totalCells <= 35 ? 35 : 42;

      var days = [];

      for (var i = 0; i < totalCells; i++) {
        var cellYear, cellMonth, cellDay, inMonth;

        if (i < startDow) {
          /* Previous month padding */
          cellDay   = daysInPrevMonth - startDow + i + 1;
          cellMonth = month - 1;
          cellYear  = year;
          if (cellMonth < 0) { cellMonth = 11; cellYear--; }
          inMonth = false;
        } else if (i < startDow + daysInMonth) {
          /* Current month */
          cellDay   = i - startDow + 1;
          cellMonth = month;
          cellYear  = year;
          inMonth   = true;
        } else {
          /* Next month padding */
          cellDay   = i - startDow - daysInMonth + 1;
          cellMonth = month + 1;
          cellYear  = year;
          if (cellMonth > 11) { cellMonth = 0; cellYear++; }
          inMonth = false;
        }

        var dateStr  = dateStrFromParts(cellYear, cellMonth + 1, cellDay);
        var cellTodos = (inMonth && deadlineMap[dateStr]) ? deadlineMap[dateStr] : [];

        days.push({
          date:     dateStr,
          day:      cellDay,
          inMonth:  inMonth,
          isToday:  dateStr === today,
          todos:    cellTodos,
          dow:      (i % 7),   /* 0=Sun, 6=Sat */
        });
      }

      return days;
    }

    /**
     * buildCalendarNav()

    function buildCalendarNav() {

        selectedCalDate = null;
        renderTodos();

      var title = document.createElement('span');
      title.id = 'cal-title';
      title.textContent = calendarYear + '년 ' + (calendarMonth + 1) + '월';
      title.setAttribute('aria-live', 'polite');

      var btnToday = document.createElement('button');
      btnToday.className = 'cal-nav-btn today-btn';
      btnToday.textContent = '오늘';

      btnToday.addEventListener('click', function() {
        var now = new Date();
        calendarYear    = now.getFullYear();
        calendarMonth   = now.getMonth();
        selectedCalDate = null;
        renderTodos();
      });

      var btnNext = document.createElement('button');
      btnNext.className = 'cal-nav-btn';
      btnNext.textContent = '›';
      btnNext.setAttribute('aria-label', '다음 달');
      btnNext.addEventListener('click', function() {
        calendarMonth++;
        if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
        selectedCalDate = null;
        renderTodos();
      });

      nav.appendChild(btnPrev);
      nav.appendChild(title);
      nav.appendChild(btnToday);
      nav.appendChild(btnNext);

      return nav;
    }

    /**
     * buildCalendarGrid()
     * Builds the 7-column calendar grid DOM element.
     */
    function buildCalendarGrid() {
      var today    = getTodayStr();
      var dayNames = ['일', '월', '화', '수', '목', '금', '토'];
      var days     = getCalendarDays(calendarYear, calendarMonth);

      var grid = document.createElement('div');
      grid.id = 'calendar-grid';
      grid.setAttribute('role', 'grid');
      grid.setAttribute('aria-label',
        calendarYear + '년 ' + (calendarMonth + 1) + '월 달력');

      /* Header row */
      dayNames.forEach(function(name) {
        var cell = document.createElement('div');
        cell.className = 'cal-header-cell';
        cell.setAttribute('role', 'columnheader');
        cell.setAttribute('abbr', name + '요일');
        cell.textContent = name;
        grid.appendChild(cell);
      });

      /* Day cells */
      days.forEach(function(d) {
        var cell = document.createElement('div');
        cell.className = 'cal-cell';
        cell.setAttribute('role', 'gridcell');
        cell.setAttribute('tabindex', d.inMonth ? '0' : '-1');

        /* Accessibility */
        var y = d.date.slice(0, 4);
        var mo = parseInt(d.date.slice(5, 7), 10);
        var dy = parseInt(d.date.slice(8, 10), 10);
        cell.setAttribute('aria-label',
          y + '년 ' + mo + '월 ' + dy + '일');

        if (d.isToday)    cell.setAttribute('aria-current', 'date');
        if (!d.inMonth)   cell.setAttribute('aria-disabled', 'true');

        /* Class modifiers */
        if (!d.inMonth)  cell.classList.add('cal-cell--other-month');
        if (d.isToday)   cell.classList.add('cal-cell--today');
        if (d.dow === 0) cell.classList.add('cal-cell--sun');
        if (d.dow === 6) cell.classList.add('cal-cell--sat');

        /* Has tasks */
        if (d.todos.length > 0) cell.classList.add('cal-cell--has-tasks');

        /* Overdue: has at least one incomplete todo past deadline */
        var hasOverdue = d.inMonth && d.date < today && d.todos.some(function(t) {
          return !t.completed;
        });
        if (hasOverdue) cell.classList.add('cal-cell--overdue');

        /* Selected */
        if (d.date === selectedCalDate) {
          cell.classList.add('cal-cell--selected');
          cell.setAttribute('aria-selected', 'true');
        } else {
          cell.setAttribute('aria-selected', 'false');
        }

        /* Day number */
        var dayNum = document.createElement('span');
        dayNum.className   = 'cal-day-num';
        dayNum.textContent = String(d.day);
        cell.appendChild(dayNum);

        /* Overdue dot indicator (top-right) */
        if (hasOverdue) {
          var dot = document.createElement('span');
          dot.className = 'cal-overdue-dot';
          dot.setAttribute('aria-hidden', 'true');
          cell.appendChild(dot);
        }

        /* Task chips — only for in-month cells */
        if (d.inMonth && d.todos.length > 0) {
          var displayTodos = d.todos.slice(0, 3);
          var extraCount   = d.todos.length - displayTodos.length;

          displayTodos.forEach(function(t) {
            /* Desktop: pill chip */
            var chip = document.createElement('div');
            chip.className = 'cal-chip cat-' + t.category;
            if (t.completed) chip.classList.add('completed');
            var label = t.text.length > 8 ? t.text.slice(0, 8) + '…' : t.text;
            chip.textContent = label;
            chip.setAttribute('aria-hidden', 'true');
            cell.appendChild(chip);

          });

          if (extraCount > 0) {
            var more = document.createElement('div');
            more.className   = 'cal-more';
            more.textContent = '• +' + extraCount + '개 더';
            more.setAttribute('aria-hidden', 'true');
            cell.appendChild(more);
          }
        }

        /* Click: toggle date selection */
        if (d.inMonth) {
          cell.addEventListener('click', function() {
            if (selectedCalDate === d.date) {
              selectedCalDate = null;
            } else {
              selectedCalDate = d.date;
            }
            renderTodos();
          });

          cell.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Enter') {
              e.preventDefault();
              cell.click();
            }
          });
        }

        grid.appendChild(cell);
      });

      return grid;
    }

    /**
     * updateCalMonthCount()
     * Updates the month summary line below the nav.
     */
    function updateCalMonthCount() {
      var summaryEl = document.getElementById('cal-month-summary');
      if (!summaryEl) return;

      /* Count todos with deadlines that fall in the displayed month */
      var y  = calendarYear;
      var m  = String(calendarMonth + 1).padStart(2, '0');
      var prefix = y + '-' + m + '-';
      var count = todos.filter(function(t) {
        return t.deadline && t.deadline.indexOf(prefix) === 0;
      }).length;

      summaryEl.textContent = count > 0 ? count + '개 일정' : '';
    }

    /**
     * renderCalendar()
     * Clears #calendar-container and rebuilds nav + summary + grid.
     */
    function renderCalendar() {
      _elCalendarContainer.innerHTML = '';
      _elCalendarContainer.appendChild(buildCalendarNav());

      /* Month summary line */
      var summary = document.createElement('p');
      summary.id = 'cal-month-summary';
      summary.setAttribute('aria-live', 'polite');
      _elCalendarContainer.appendChild(summary);

      _elCalendarContainer.appendChild(buildCalendarGrid());

      updateCalMonthCount();
    }

    /* ── 뷰 전환 ── */

    function setView(v) {
      activeView      = v;
      selectedCalDate = null;
      renderTodos();
    }

    /* ── 렌더링 ── */

    function renderTodos() {
      /* ── View visibility ── */
      if (activeView === 'list') {
        _elListArea.style.display    = '';
        _elCalendarArea.style.display = 'none';
      } else {
        /* calendar view: show calendar above; list below (still visible for date-filtered items) */
        _elCalendarArea.style.display = 'block';
        _elListArea.style.display     = '';
      }

      /* ── Sync view-toggle button states ── */
      document.querySelectorAll('.view-btn').forEach(function(btn) {
        var isActive = btn.dataset.view === activeView;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', String(isActive));
      });

      /* ── Calendar date-filter banner ── */
      if (activeView === 'calendar' && selectedCalDate !== null) {
        var parts = selectedCalDate.split('-');
        var y = parts[0];
        var mo = parseInt(parts[1], 10);
        var dy = parseInt(parts[2], 10);
        _elCalFilterLabelText.textContent =
          y + '년 ' + mo + '월 ' + dy + '일 마감인 항목만 표시 중';
        _elCalDateFilterBar.style.display = 'flex';
      } else {
        _elCalDateFilterBar.style.display = 'none';
      }

      /* ── Build todo list ── */
      _elTodoList.innerHTML = '';

      var visible = sortTodos(getVisible());

      if (visible.length === 0) {
        _elEmptyMessage.style.display = 'block';
        if (activeView === 'calendar' && selectedCalDate !== null) {
          var parts2 = selectedCalDate.split('-');
          var y2  = parts2[0];
          var mo2 = parseInt(parts2[1], 10);
          var dy2 = parseInt(parts2[2], 10);
          _elEmptyMessage.querySelector('.empty-icon').textContent = '📅';
          _elEmptyMainText.textContent =
            y2 + '년 ' + mo2 + '월 ' + dy2 + '일 마감인 할 일이 없습니다.';
          _elEmptySubText.textContent = '날짜를 다시 선택하거나 새 항목을 추가해 보세요.';
        } else if (todos.length === 0) {
          _elEmptyMessage.querySelector('.empty-icon').textContent = '📭';
          _elEmptyMainText.textContent = '할 일이 없습니다.';
          _elEmptySubText.textContent  = '위 입력창에 할 일을 추가해 보세요.';
        } else {
          _elEmptyMessage.querySelector('.empty-icon').textContent = '🔍';
          _elEmptyMainText.textContent = '해당 카테고리의 할 일이 없습니다.';
          _elEmptySubText.textContent  = '다른 필터를 선택하거나 새 항목을 추가해 보세요.';
        }
      } else {
        _elEmptyMessage.style.display = 'none';
      }

      var today = getTodayStr();

      visible.forEach(function(todo) {
        var isSelected = selectedIds.has(todo.id);
        var isOverdue  = !todo.completed && todo.deadline && todo.deadline < today;
        var isDueToday = !todo.completed && todo.deadline && todo.deadline === today;

        var li = document.createElement('li');
        li.className =
          'todo-item'
          + (todo.completed ? ' completed'  : '')
          + (selectionMode  ? ' selecting'  : '')
          + (isSelected     ? ' selected'   : '')
          + (isOverdue      ? ' overdue'    : '')
          + (isDueToday     ? ' due-today'  : '');
        li.dataset.id       = todo.id;
        li.dataset.category = todo.category;

        if (todo.id === editingId) {
          buildEditRow(li, todo);
        } else if (selectionMode) {
          buildSelectRow(li, todo, isSelected);
        } else {
          buildViewRow(li, todo);
        }

        _elTodoList.appendChild(li);
      });

      /* Update filter button states */
      document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.filter === activeFilter);
        btn.setAttribute('aria-pressed', String(btn.dataset.filter === activeFilter));
      });

      /* Update sort pill states */
      document.querySelectorAll('.sort-pill').forEach(function(pill) {
        pill.classList.toggle('active', pill.dataset.sort === activeSort);
        pill.setAttribute('aria-pressed', String(pill.dataset.sort === activeSort));
      });

      renderSelToolbar(visible);
      updateProgress();
      updateDashboard();

      /* Always keep calendar in sync (rebuilds when in calendar view) */
      if (activeView === 'calendar') {
        renderCalendar();
      }
    }

    /* ── 일반 모드 행 ── */

    function buildViewRow(li, todo) {
      var checkbox = document.createElement('div');
      checkbox.className = 'todo-checkbox' + (todo.completed ? ' checked' : '');
      checkbox.setAttribute('role', 'checkbox');
      checkbox.setAttribute('aria-checked', String(todo.completed));
      checkbox.setAttribute('aria-label',
        todo.completed ? '완료됨. 클릭하여 미완료로 변경' : '미완료. 클릭하여 완료 처리');
      checkbox.setAttribute('tabindex', '0');
      checkbox.addEventListener('click', function() { toggleTodo(todo.id); });
      checkbox.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleTodo(todo.id); }
      });

      var text = document.createElement('span');
      text.className   = 'todo-text';
      text.textContent = todo.text;

      var deadlineBadge = buildDeadlineBadge(todo.deadline, todo.completed);

      var badge = document.createElement('span');
      badge.className   = 'category-badge ' + todo.category;
      badge.textContent = todo.category;

      var actions = document.createElement('div');
      actions.className = 'todo-actions';

      var btnEdit = document.createElement('button');
      btnEdit.className   = 'btn-edit';
      btnEdit.textContent = '수정';
      btnEdit.setAttribute('aria-label', '"' + todo.text.slice(0, 15) + '" 수정');
      btnEdit.addEventListener('click', function() { startEdit(todo.id); });

      var btnDelete = document.createElement('button');
      btnDelete.className   = 'btn-delete';
      btnDelete.textContent = '삭제';
      btnDelete.setAttribute('aria-label', '"' + todo.text.slice(0, 15) + '" 삭제');
      btnDelete.addEventListener('click', function() { deleteTodo(todo.id, todo.text); });

      actions.appendChild(btnEdit);
      actions.appendChild(btnDelete);

      li.appendChild(checkbox);
      li.appendChild(text);
      if (deadlineBadge) li.appendChild(deadlineBadge);
      li.appendChild(badge);
      li.appendChild(actions);
    }

    /* ── 선택 모드 행 ── */

    function buildSelectRow(li, todo, isSelected) {
      var selBox = document.createElement('div');
      selBox.className = 'sel-check' + (isSelected ? ' checked' : '');
      selBox.setAttribute('role', 'checkbox');
      selBox.setAttribute('aria-checked', String(isSelected));
      selBox.setAttribute('aria-label',
        todo.text.slice(0, 20) + (isSelected ? ' — 선택됨' : ' — 선택 안 됨'));
      selBox.setAttribute('tabindex', '0');

      function toggleSelect(e) {
        e.stopPropagation();
        if (selectedIds.has(todo.id)) {
          selectedIds.delete(todo.id);
        } else {
          selectedIds.add(todo.id);
        }
        renderTodos();
      }

      selBox.addEventListener('click', toggleSelect);
      selBox.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleSelect(e); }
      });
      li.addEventListener('click', toggleSelect);

      var text = document.createElement('span');
      text.className   = 'todo-text';
      text.textContent = todo.text;

      var deadlineBadge = buildDeadlineBadge(todo.deadline, todo.completed);

      var badge = document.createElement('span');
      badge.className   = 'category-badge ' + todo.category;
      badge.textContent = todo.category;

      li.appendChild(selBox);
      li.appendChild(text);
      if (deadlineBadge) li.appendChild(deadlineBadge);
      li.appendChild(badge);
    }

    /* ── 수정 모드 행 ── */

    function buildEditRow(li, todo) {
      var editInput = document.createElement('input');
      editInput.type      = 'text';
      editInput.className = 'edit-input';
      editInput.value     = todo.text;
      editInput.maxLength = 200;
      editInput.setAttribute('aria-label', '할 일 수정');

      var editSelect = document.createElement('select');
      editSelect.className = 'edit-select';
      editSelect.setAttribute('aria-label', '카테고리 선택');
      VALID_CATS.forEach(function(cat) {
        var opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        if (cat === todo.category) opt.selected = true;
        editSelect.appendChild(opt);
      });

      var editDate = document.createElement('input');
      editDate.type      = 'date';
      editDate.className = 'edit-date';
      editDate.setAttribute('aria-label', '마감일 수정');
      if (todo.deadline) editDate.value = todo.deadline;

      var hint = document.createElement('span');
      hint.className = 'edit-hint';
      hint.id        = 'edit-hint-' + todo.id;

      var actions = document.createElement('div');
      actions.className = 'todo-actions';

      var btnSave = document.createElement('button');
      btnSave.className   = 'btn-save';
      btnSave.textContent = '저장';
      btnSave.addEventListener('click', function() {
        saveEdit(todo.id, editInput.value.trim(), editSelect.value, editDate.value || null);
      });

      var btnCancel = document.createElement('button');
      btnCancel.className   = 'btn-cancel';
      btnCancel.textContent = '취소';
      btnCancel.addEventListener('click', cancelEdit);

      editInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter')
          saveEdit(todo.id, editInput.value.trim(), editSelect.value, editDate.value || null);
        if (e.key === 'Escape') cancelEdit();
      });

      actions.appendChild(btnSave);
      actions.appendChild(btnCancel);

      li.appendChild(editInput);
      li.appendChild(editDate);
      li.appendChild(editSelect);
      li.appendChild(hint);
      li.appendChild(actions);

      setTimeout(function() { editInput.focus(); }, 0);
    }

    /* ── 액션 함수 ── */

    function toggleTodo(id) {
      var newVal;
      todos = todos.map(function(t) {
        if (t.id === id) { newVal = !t.completed; return Object.assign({}, t, { completed: newVal }); }
        return t;
      });
      renderTodos();
      sbUpdate(id, { completed: newVal });
    }

    function startEdit(id) {
      selectionMode = false;
      selectedIds.clear();
      editingId = id;
      renderTodos();
    }

    function saveEdit(id, newText, newCategory, newDeadline) {
      if (newText === '') {
        var hint = document.getElementById('edit-hint-' + id);
        if (hint) hint.textContent = '내용을 입력해 주세요.';
        return;
      }
      var newDeadlineVal = isValidDeadline(newDeadline) ? newDeadline : null;
      todos = todos.map(function(t) {
        return t.id === id
          ? Object.assign({}, t, {
              text:     newText,
              category: newCategory,
              deadline: newDeadlineVal,
            })
          : t;
      });
      editingId = null;
      renderTodos();
      sbUpdate(id, { text: newText, category: newCategory, deadline: newDeadlineVal });
    }

    function cancelEdit() {
      editingId = null;
      renderTodos();
    }

    function deleteTodo(id, text) {
      var label = text.length > 20 ? text.slice(0, 20) + '…' : text;
      if (!confirm('"' + label + '"\n\n삭제하시겠습니까?')) return;
      todos = todos.filter(function(t) { return t.id !== id; });
      if (editingId === id) editingId = null;
      selectedIds.delete(id);
      renderTodos();
      sbDelete(id);
    }

    function deleteSelected() {
      var count = selectedIds.size;
      if (count === 0) return;
      if (!confirm(count + '개 항목을 삭제하시겠습니까?')) return;

      var idsToDelete = Array.from(selectedIds);
      if (editingId && selectedIds.has(editingId)) editingId = null;
      todos = todos.filter(function(t) { return !selectedIds.has(t.id); });
      selectedIds.clear();

      if (todos.length === 0) selectionMode = false;

      renderTodos();
      sbDeleteMany(idsToDelete);
    }

    function addTodo() {
      var text     = _elTodoInput.value.trim();
      var category = VALID_CATS.indexOf(_elCategorySelect.value) !== -1
        ? _elCategorySelect.value : '개인';
      var deadline = _elDeadlineInput.value || null;

      if (text === '') {
        _elTodoInput.classList.add('invalid');
        _elHintText.style.display = 'block';
        _elTodoInput.focus();
        return;
      }

      _elTodoInput.classList.remove('invalid');
      _elHintText.style.display = 'none';

      var newTodo = createTodo(text, category, deadline);
      todos.push(newTodo);
      renderTodos();
      sbInsert(newTodo);

      _elTodoInput.value      = '';
      _elDeadlineInput.value  = '';
      _elTodoInput.focus();
      userOverrideCat          = false;
      _elCategorySelect.value  = '개인';
      hideBadge();
    }

    /* ── 자동 분류 배지 헬퍼 ── */

    function showBadge() { _elAutoCatBadge.classList.add('visible'); }
    function hideBadge() { _elAutoCatBadge.classList.remove('visible'); }

    /* ── DB 로딩 상태 ── */

    function hideDbLoading() {
      if (_elDbLoading) _elDbLoading.style.display = 'none';
    }

    /* ═══════════════════════════════════════════════════════
       EVENT WIRING
    ═══════════════════════════════════════════════════════ */

    document.getElementById('add-btn').addEventListener('click', addTodo);

    _elTodoInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    /* Auto-classify — 120ms debounce */
    var _detectTimer = null;

    _elTodoInput.addEventListener('input', function() {
      var text = this.value.trim();

      if (text !== '') {
        this.classList.remove('invalid');
        _elHintText.style.display = 'none';
      }

      if (text === '') {
        clearTimeout(_detectTimer);
        userOverrideCat          = false;
        _elCategorySelect.value  = '개인';
        hideBadge();
        return;
      }

      if (!userOverrideCat) {
        clearTimeout(_detectTimer);
        _detectTimer = setTimeout(function() {
          var detected = detectCategory(text);
          if (detected) {
            _elCategorySelect.value = detected;
            showBadge();
          } else {
            _elCategorySelect.value = '개인';
            hideBadge();
          }
        }, 120);
      }
    });

    _elCategorySelect.addEventListener('change', function() {
      userOverrideCat = true;
      hideBadge();
    });

    /* Filter + sort pill clicks */
    document.getElementById('filter-area').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (btn) {
        activeFilter = btn.dataset.filter;
        editingId    = null;
        /* Preserve selectionMode; clear selectedIds on filter change */
        selectedIds.clear();
        renderTodos();
        return;
      }

      var pill = e.target.closest('.sort-pill');
      if (pill && pill.dataset.sort) {
        activeSort = pill.dataset.sort;
        saveSort(activeSort);
        renderTodos();
        return;
      }

      var viewBtn = e.target.closest('.view-btn');
      if (viewBtn && viewBtn.dataset.view) {
        setView(viewBtn.dataset.view);
      }
    });

    /* Calendar date-filter clear button */
    document.getElementById('btn-cal-clear').addEventListener('click', function() {
      selectedCalDate = null;
      renderTodos();
    });

    /* ── 초기 진입 ── */
    reloadFromDB();
  </script>
</body>
</html>
