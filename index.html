<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Todo</title>
  <style>
    /* ── 디자인 토큰 ── */
    :root {
      --bg:         #f1f5f9;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --text:       #1e293b;
      --text-sub:   #64748b;
      --text-muted: #94a3b8;
      --primary:    #4f7fe8;
      --primary-dk: #3b6fd4;
      --danger:     #ef4444;
      --success:    #10b981;
      --sel-color:  #7c3aed;
      --r:          8px;
      --r-pill:     999px;
      --shadow:     0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-up:  0 4px 14px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.05);
      --tr:         0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    #progress-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    #progress-label { font-size: 0.78rem; color: var(--text-sub); white-space: nowrap; }

    #progress-track {
      width: 128px; height: 6px;
      background: var(--border);
      border-radius: var(--r-pill);
      overflow: hidden;
    }

    #progress-fill {
      height: 100%; width: 0%;
      background: var(--primary);
      border-radius: var(--r-pill);
      transition: width 0.45s ease, background-color 0.45s ease;
    }

    #progress-fill.complete { background: var(--success); }

    /* ── 입력 영역 ── */
    #input-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #input-area {
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #todo-input,
    #category-select {
      padding: 9px 12px;
      font-size: 0.93rem;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      background: var(--surface);
      transition: border-color var(--tr), box-shadow var(--tr);
      outline: none;
    }

    #todo-input { flex: 1; min-width: 0; }
    #todo-input::placeholder { color: var(--text-muted); }

    #todo-input:focus,
    #category-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,127,232,.15);
    }

    #todo-input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,.12);
    }

    #add-btn {
      padding: 9px 18px;
      font-size: 0.93rem;
      font-family: inherit;
      font-weight: 600;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--r);
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--tr), box-shadow var(--tr), transform 0.1s;
    }

    #add-btn:hover  { background: var(--primary-dk); box-shadow: 0 2px 10px rgba(79,127,232,.35); }
    #add-btn:active { transform: translateY(1px); }
    #add-btn:focus-visible { outline: 3px solid rgba(79,127,232,.4); outline-offset: 2px; }

    #hint-text {
      display: none;
      font-size: 0.78rem;
      color: var(--danger);
      padding: 0 24px 10px;
    }

    /* ── 카테고리 필터 ── */
    #filter-area {
      max-width: 760px;
      margin: 16px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 5px 14px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: var(--r-pill);
      cursor: pointer;
      background: var(--surface);
      color: var(--text-sub);
      transition: background var(--tr), color var(--tr), border-color var(--tr);
      outline: none;
    }

    .filter-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
    .filter-btn:focus-visible { box-shadow: 0 0 0 3px rgba(79,127,232,.2); }

    .filter-btn.active[data-filter="all"]  { background: #1e293b; color: #fff; border-color: #1e293b; }
    .filter-btn.active[data-filter="업무"] { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    .filter-btn.active[data-filter="개인"] { background: #059669; color: #fff; border-color: #059669; }
    .filter-btn.active[data-filter="공부"] { background: #6d28d9; color: #fff; border-color: #6d28d9; }

    /* 자동 분류 배지 */
    #auto-cat-badge {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #ede9fe;
      color: #5b21b6;
      border-radius: var(--r-pill);
      white-space: nowrap;
      flex-shrink: 0;
      cursor: default;
      user-select: none;
    }

    #auto-cat-badge.visible { display: flex; }

    /* ── 목록 영역 ── */
    #list-area {
      max-width: 760px;
      margin: 12px auto 48px;
      padding: 0 24px;
    }

    /* 전체 완료 배너 */
    #all-done-banner {
      display: none;
      text-align: center;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: var(--r);
      padding: 12px 16px;
      margin-bottom: 10px;
      color: #065f46;
      font-size: 0.88rem;
      font-weight: 600;
    }

    /* ── 선택 툴바 ── */
    #sel-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      min-height: 34px;
    }

    /* 기본 모드: "선택" 버튼 */
    .btn-sel-enter {
      margin-left: auto;
      padding: 4px 12px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: var(--r-pill);
      background: var(--surface);
      color: var(--text-sub);
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr);
    }

    .btn-sel-enter:hover { background: #f8fafc; border-color: #cbd5e1; }

    /* 선택 모드 툴바 */
    #sel-active {
      display: none;
      width: 100%;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1.5px solid #ddd6fe;
      border-radius: var(--r);
      padding: 7px 12px;
      box-shadow: var(--shadow);
    }

    /* 원형 선택 체크박스 (툴바 전체 선택용) */
    .sel-check {
      position: relative;
      width: 19px;
      height: 19px;
      border: 2px solid #c4b5fd;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color var(--tr), background var(--tr);
    }

    .sel-check:hover { border-color: var(--sel-color); }

    .sel-check.checked {
      background: var(--sel-color);
      border-color: var(--sel-color);
    }

    .sel-check.checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    /* 일부만 선택된 중간 상태 */
    .sel-check.indeterminate {
      background: var(--sel-color);
      border-color: var(--sel-color);
    }

    .sel-check.indeterminate::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 2px;
      background: #fff;
      border-radius: 1px;
    }

    #sel-all-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      white-space: nowrap;
    }

    #sel-count {
      font-size: 0.82rem;
      color: var(--sel-color);
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-sel-delete {
      padding: 4px 12px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 600;
      border: 1.5px solid var(--danger);
      border-radius: 6px;
      background: transparent;
      color: var(--danger);
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--tr), opacity var(--tr);
    }

    .btn-sel-delete:hover:not(:disabled) { background: #fef2f2; }
    .btn-sel-delete:disabled { opacity: 0.4; cursor: default; }

    .btn-sel-cancel {
      padding: 4px 12px;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-sub);
      cursor: pointer;
      transition: background var(--tr);
    }

    .btn-sel-cancel:hover { background: #f8fafc; }

    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── 할 일 항목 ── */
    .todo-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 11px;
      box-shadow: var(--shadow);
      transition: box-shadow var(--tr), transform var(--tr), background var(--tr), border-color var(--tr);
    }

    .todo-item:hover { box-shadow: var(--shadow-up); transform: translateY(-1px); }

    /* 선택된 항목 */
    .todo-item.selected {
      background: #f5f3ff;
      border-color: #c4b5fd;
    }

    /* 선택 모드에서 항목 전체를 클릭 가능하게 */
    .todo-item.selecting { cursor: pointer; }
    .todo-item.selecting:hover { background: #faf5ff; }
    .todo-item.selecting.selected:hover { background: #ede9fe; }

    /* 카테고리별 왼쪽 액센트 */
    .todo-item[data-category="업무"] { border-left: 3px solid #60a5fa; }
    .todo-item[data-category="개인"] { border-left: 3px solid #34d399; }
    .todo-item[data-category="공부"] { border-left: 3px solid #a78bfa; }

    .todo-item.selected[data-category="업무"],
    .todo-item.selected[data-category="개인"],
    .todo-item.selected[data-category="공부"] { border-left-color: var(--sel-color); }

    /* 완료 체크박스 (파란 사각형) */
    .todo-checkbox {
      position: relative;
      width: 19px; height: 19px;
      border: 2px solid #cbd5e1;
      border-radius: 5px;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color var(--tr), background var(--tr);
    }

    .todo-checkbox:hover         { border-color: var(--primary); }
    .todo-checkbox.checked        { background: var(--primary); border-color: var(--primary); }

    .todo-checkbox.checked::after {
      content: '';
      position: absolute;
      top: 2px; left: 5px;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    /* 완료된 항목 */
    .todo-item.completed { opacity: 0.55; }
    .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-muted); }

    .todo-text {
      flex: 1;
      font-size: 0.93rem;
      line-height: 1.45;
      word-break: break-word;
    }

    /* 카테고리 배지 */
    .category-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      flex-shrink: 0;
    }

    .category-badge.업무 { background: #dbeafe; color: #1e40af; }
    .category-badge.개인 { background: #d1fae5; color: #065f46; }
    .category-badge.공부 { background: #ede9fe; color: #5b21b6; }

    /* 수정·삭제 버튼 */
    .todo-actions { display: flex; gap: 5px; flex-shrink: 0; }

    @media (hover: hover) {
      .todo-actions { opacity: 0; transition: opacity var(--tr); }
      .todo-item:hover .todo-actions,
      .todo-item:focus-within .todo-actions { opacity: 1; }
    }

    .btn-edit, .btn-delete, .btn-save, .btn-cancel {
      padding: 4px 10px;
      font-size: 0.76rem;
      font-family: inherit;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      border: 1.5px solid;
      transition: background var(--tr);
      white-space: nowrap;
    }

    .btn-edit   { color: var(--primary); border-color: var(--primary); }
    .btn-edit:hover   { background: #eff6ff; }
    .btn-delete { color: var(--danger);  border-color: var(--danger);  }
    .btn-delete:hover { background: #fef2f2; }
    .btn-save   { color: var(--success); border-color: var(--success); }
    .btn-save:hover   { background: #f0fdf4; }
    .btn-cancel { color: var(--text-sub); border-color: var(--border); }
    .btn-cancel:hover { background: #f8fafc; }

    /* 수정 모드 */
    .edit-input {
      flex: 1; min-width: 0;
      padding: 6px 10px;
      font-size: 0.93rem;
      font-family: inherit;
      border: 1.5px solid var(--primary);
      border-radius: 6px;
      outline: none;
      box-shadow: 0 0 0 3px rgba(79,127,232,.15);
      color: var(--text);
    }

    .edit-select {
      padding: 6px 8px;
      font-size: 0.85rem;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
    }

    .edit-select:focus { border-color: var(--primary); }
    .edit-hint { font-size: 0.75rem; color: var(--danger); white-space: nowrap; }

    /* 빈 상태 */
    #empty-message {
      display: none;
      text-align: center;
      color: var(--text-muted);
      margin-top: 60px;
      font-size: 0.93rem;
    }

    /* ── 모바일 반응형 ── */
    @media (max-width: 560px) {
      header    { padding: 10px 16px; }
      header h1 { font-size: 1.05rem; }
      #progress-track { width: 88px; }

      #input-area { flex-wrap: wrap; padding: 10px 16px; gap: 6px; }
      #todo-input { flex-basis: 100%; }
      #category-select { flex: 1; }
      #hint-text { padding: 0 16px 10px; }

      #filter-area,
      #list-area  { padding: 0 16px; }

      .todo-item { padding: 10px 12px; gap: 8px; }
      .todo-actions { opacity: 1 !important; }

      .btn-sel-delete,
      .btn-sel-cancel { padding: 4px 9px; }
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <h1>Daily Todo</h1>
    <div id="progress-area">
      <span id="progress-label">할 일 없음</span>
      <div id="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="progress-fill"></div></div>
    </div>
  </header>

  <!-- 입력 영역 -->
  <div id="input-wrap">
    <div id="input-area">
      <input
        type="text"
        id="todo-input"
        placeholder="할 일을 입력하세요"
        maxlength="200"
        autocomplete="off"
      />
      <select id="category-select">
        <option value="업무">업무</option>
        <option value="개인" selected>개인</option>
        <option value="공부">공부</option>
      </select>
      <span id="auto-cat-badge" title="키워드로 자동 분류됐습니다. 직접 변경할 수 있어요.">✦ 자동 분류</span>
      <button id="add-btn">추가</button>
    </div>
    <p id="hint-text">할 일 내용을 입력해 주세요.</p>
  </div>

  <!-- 카테고리 필터 -->
  <nav id="filter-area">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="업무">업무</button>
    <button class="filter-btn" data-filter="개인">개인</button>
    <button class="filter-btn" data-filter="공부">공부</button>
  </nav>

  <!-- 목록 영역 -->
  <main id="list-area">
    <div id="all-done-banner">모든 할 일을 완료했습니다!</div>

    <!-- 선택 툴바 (JS가 채움) -->
    <div id="sel-toolbar">
      <div id="sel-active" style="display:none; width:100%"></div>
    </div>

    <ul id="todo-list"></ul>
    <p id="empty-message">할 일이 없습니다.</p>
  </main>

  <script>
    /* ── 상수 ── */
    const STORAGE_KEY = 'daily-todos';
    const VALID_CATS  = ['업무', '개인', '공부'];

    /* ── 키워드 → 카테고리 자동 분류 ── */
    const KEYWORD_MAP = {
      '업무': [
        '회의', '미팅', '보고서', '기획', '발표', '이메일', '메일', '출장', '계약',
        '프로젝트', '고객', '클라이언트', '제안서', '예산', '마감', '결재', '채용',
        '면접', '업무', '거래처', '납기', '기안', '검토', '세금', '청구', '견적',
        '협의', '승인', '팀장', '부장', '대리', '인수인계', '주간보고', '야근',
      ],
      '공부': [
        '공부', '학습', '강의', '수업', '시험', '과제', '복습', '예습', '독서',
        '책', '읽기', '노트', '정리', '교재', '암기', '단어', '영어', '수학',
        '코딩', '프로그래밍', '알고리즘', '스터디', '자격증', '인강', '풀기',
        '문제', '오답', '요약', '필기', '논문', '레포트', '발제', '세미나',
      ],
      '개인': [
        '운동', '쇼핑', '청소', '빨래', '요리', '병원', '약국', '친구', '가족',
        '여행', '취미', '산책', '헬스', '약속', '생일', '선물', '영화', '드라마',
        '게임', '휴식', '수면', '식사', '장보기', '이발', '미용', '치과', '안과',
        '운전', '세탁', '반려', '강아지', '고양이', '집안일',
      ],
    };

    function detectCategory(text) {
      if (!text) return null;
      var scores = { '업무': 0, '개인': 0, '공부': 0 };
      Object.keys(KEYWORD_MAP).forEach(function(cat) {
        KEYWORD_MAP[cat].forEach(function(kw) {
          if (text.indexOf(kw) !== -1) scores[cat]++;
        });
      });
      var best = null, top = 0;
      Object.keys(scores).forEach(function(cat) {
        if (scores[cat] > top) { top = scores[cat]; best = cat; }
      });
      return best;  /* null = 키워드 없음 */
    }

    /* ── localStorage ── */

    function loadTodos() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? sanitize(JSON.parse(raw)) : [];
      } catch { return []; }
    }

    function sanitize(data) {
      if (!Array.isArray(data)) return [];
      return data
        .filter(function(t) {
          return t != null
            && typeof t.id   === 'string' && t.id   !== ''
            && typeof t.text === 'string' && t.text.trim() !== '';
        })
        .map(function(t) {
          return {
            id:        t.id,
            text:      String(t.text).slice(0, 200),
            category:  VALID_CATS.includes(t.category) ? t.category : '개인',
            completed: Boolean(t.completed),
            createdAt: typeof t.createdAt === 'string' ? t.createdAt : new Date().toISOString(),
          };
        });
    }

    function saveTodos(list) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch { /* 용량 초과 */ }
    }

    /* ── 데이터 모델 ── */

    function createTodo(text, category) {
      return {
        id: typeof crypto.randomUUID === 'function'
          ? crypto.randomUUID()
          : Date.now().toString(36) + Math.random().toString(36).slice(2),
        text, category,
        completed: false,
        createdAt: new Date().toISOString(),
      };
    }

    /* ── 앱 상태 ── */
    var todos        = loadTodos();
    var editingId    = null;
    var activeFilter = 'all';
    var selectionMode  = false;
    var selectedIds    = new Set();   // 선택된 todo id 집합
    var userOverrideCat = false;      // 사용자가 카테고리를 직접 변경했으면 true

    /* ── 캐시된 DOM 참조 (DOMContentLoaded 이후 한 번만 조회) ── */
    var _elTodoList      = document.getElementById('todo-list');
    var _elEmptyMessage  = document.getElementById('empty-message');
    var _elAllDoneBanner = document.getElementById('all-done-banner');
    var _elProgressLabel = document.getElementById('progress-label');
    var _elProgressFill  = document.getElementById('progress-fill');
    var _elSelToolbar    = document.getElementById('sel-toolbar');
    var _elSelActive     = document.getElementById('sel-active');
    var _elTodoInput     = document.getElementById('todo-input');
    var _elCategorySelect = document.getElementById('category-select');
    var _elHintText      = document.getElementById('hint-text');
    var _elAutoCatBadge  = document.getElementById('auto-cat-badge');

    /* ── 현재 필터 기준 visible 항목 ── */

    function getVisible() {
      return activeFilter === 'all'
        ? todos
        : todos.filter(function(t) { return t.category === activeFilter; });
    }

    /* ── 진행률 ── */

    function updateProgress() {
      var total = todos.length;
      var done  = todos.filter(function(t) { return t.completed; }).length;
      var pct   = total === 0 ? 0 : Math.round(done / total * 100);

      _elProgressLabel.textContent =
        total === 0 ? '할 일 없음' : done + ' / ' + total + ' 완료 (' + pct + '%)';

      _elProgressFill.style.width = pct + '%';
      _elProgressFill.classList.toggle('complete', pct === 100);
      document.getElementById('progress-track').setAttribute('aria-valuenow', String(pct));

      _elAllDoneBanner.style.display =
        (total > 0 && pct === 100) ? 'block' : 'none';
    }

    /* ── 선택 툴바 렌더링 ── */

    /* visible is passed in from renderTodos() — avoids a second getVisible() call */
    function renderSelToolbar(visible) {
      var toolbar   = _elSelToolbar;
      var activeBar = _elSelActive;
      var visSelIds = visible.filter(function(t) { return selectedIds.has(t.id); });
      var selCount  = visSelIds.length;
      var allCount  = visible.length;

      /* 기존 "선택" 버튼 제거 후 재생성 */
      var old = document.getElementById('sel-enter-btn');
      if (old) old.remove();

      if (!selectionMode) {
        activeBar.style.display = 'none';
        /* 항목이 1개 이상일 때만 "선택" 버튼 표시 */
        if (todos.length > 0) {
          var btnEnter = document.createElement('button');
          btnEnter.id        = 'sel-enter-btn';
          btnEnter.className = 'btn-sel-enter';
          btnEnter.textContent = '선택';
          btnEnter.addEventListener('click', function() {
            editingId     = null;
            selectionMode = true;
            renderTodos();
          });
          toolbar.appendChild(btnEnter);
        }
        return;
      }

      /* 선택 모드: 인라인 툴바 구성 */
      activeBar.style.display = 'flex';
      activeBar.innerHTML = '';

      /* 전체 선택 체크박스 */
      var allBox = document.createElement('div');
      allBox.className = 'sel-check';
      if (selCount === allCount && allCount > 0) {
        allBox.classList.add('checked');
      } else if (selCount > 0) {
        allBox.classList.add('indeterminate');
      }
      allBox.addEventListener('click', function() {
        if (selCount === allCount && allCount > 0) {
          visible.forEach(function(t) { selectedIds.delete(t.id); });
        } else {
          visible.forEach(function(t) { selectedIds.add(t.id); });
        }
        renderTodos();
      });

      /* 전체 선택 라벨 */
      var allLabel = document.createElement('span');
      allLabel.id          = 'sel-all-label';
      allLabel.textContent = (selCount === allCount && allCount > 0) ? '전체 해제' : '전체 선택';
      allLabel.addEventListener('click', function() { allBox.click(); });

      /* 선택 수 */
      var countEl = document.createElement('span');
      countEl.id = 'sel-count';
      countEl.textContent = selCount > 0 ? selCount + '개 선택됨' : '';

      /* 스페이서 */
      var spacer = document.createElement('div');
      spacer.style.flex = '1';

      /* 선택 삭제 버튼 */
      var btnDel = document.createElement('button');
      btnDel.className   = 'btn-sel-delete';
      btnDel.textContent = selCount > 0 ? '선택 삭제 (' + selCount + ')' : '선택 삭제';
      btnDel.disabled    = selCount === 0;
      btnDel.addEventListener('click', deleteSelected);

      /* 취소 버튼 */
      var btnCancel = document.createElement('button');
      btnCancel.className   = 'btn-sel-cancel';
      btnCancel.textContent = '취소';
      btnCancel.addEventListener('click', function() {
        selectionMode = false;
        selectedIds.clear();
        renderTodos();
      });

      activeBar.appendChild(allBox);
      activeBar.appendChild(allLabel);
      activeBar.appendChild(countEl);
      activeBar.appendChild(spacer);
      activeBar.appendChild(btnDel);
      activeBar.appendChild(btnCancel);
    }

    /* ── 렌더링 ── */

    function renderTodos() {
      _elTodoList.innerHTML = '';

      /* Compute visible once; reuse for both the list and the toolbar */
      var visible = getVisible();

      if (visible.length === 0) {
        _elEmptyMessage.style.display = 'block';
        _elEmptyMessage.textContent   = todos.length === 0
          ? '할 일이 없습니다.'
          : '해당 카테고리의 할 일이 없습니다.';
      } else {
        _elEmptyMessage.style.display = 'none';
      }

      visible.forEach(function(todo) {
        var isSelected = selectedIds.has(todo.id);
        var li = document.createElement('li');
        li.className        = 'todo-item'
          + (todo.completed    ? ' completed'  : '')
          + (selectionMode     ? ' selecting'  : '')
          + (isSelected        ? ' selected'   : '');
        li.dataset.id       = todo.id;
        li.dataset.category = todo.category;

        if (todo.id === editingId) {
          buildEditRow(li, todo);
        } else if (selectionMode) {
          buildSelectRow(li, todo, isSelected);
        } else {
          buildViewRow(li, todo);
        }

        _elTodoList.appendChild(li);
      });

      document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.filter === activeFilter);
        btn.setAttribute('aria-pressed', String(btn.dataset.filter === activeFilter));
      });

      /* Pass the already-computed visible array — no second filter pass needed */
      renderSelToolbar(visible);
      updateProgress();
    }

    /* ── 일반 모드 행 ── */

    function buildViewRow(li, todo) {
      var checkbox = document.createElement('div');
      checkbox.className = 'todo-checkbox' + (todo.completed ? ' checked' : '');
      checkbox.setAttribute('role', 'checkbox');
      checkbox.setAttribute('aria-checked', String(todo.completed));
      checkbox.setAttribute('tabindex', '0');
      checkbox.addEventListener('click', function() { toggleTodo(todo.id); });
      checkbox.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleTodo(todo.id); }
      });

      var text = document.createElement('span');
      text.className   = 'todo-text';
      text.textContent = todo.text;

      var badge = document.createElement('span');
      badge.className   = 'category-badge ' + todo.category;
      badge.textContent = todo.category;

      var actions = document.createElement('div');
      actions.className = 'todo-actions';

      var btnEdit = document.createElement('button');
      btnEdit.className   = 'btn-edit';
      btnEdit.textContent = '수정';
      btnEdit.addEventListener('click', function() { startEdit(todo.id); });

      var btnDelete = document.createElement('button');
      btnDelete.className   = 'btn-delete';
      btnDelete.textContent = '삭제';
      btnDelete.addEventListener('click', function() { deleteTodo(todo.id, todo.text); });

      actions.appendChild(btnEdit);
      actions.appendChild(btnDelete);
      li.appendChild(checkbox);
      li.appendChild(text);
      li.appendChild(badge);
      li.appendChild(actions);
    }

    /* ── 선택 모드 행 ── */

    function buildSelectRow(li, todo, isSelected) {
      /* 원형 선택 체크박스 */
      var selBox = document.createElement('div');
      selBox.className = 'sel-check' + (isSelected ? ' checked' : '');
      selBox.setAttribute('role', 'checkbox');
      selBox.setAttribute('aria-checked', String(isSelected));
      selBox.setAttribute('tabindex', '0');

      /* 행 전체 클릭으로 선택 토글 */
      function toggleSelect(e) {
        e.stopPropagation();
        if (selectedIds.has(todo.id)) {
          selectedIds.delete(todo.id);
        } else {
          selectedIds.add(todo.id);
        }
        renderTodos();
      }

      selBox.addEventListener('click', toggleSelect);
      selBox.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleSelect(e); }
      });
      li.addEventListener('click', toggleSelect);

      var text = document.createElement('span');
      text.className   = 'todo-text';
      text.textContent = todo.text;

      var badge = document.createElement('span');
      badge.className   = 'category-badge ' + todo.category;
      badge.textContent = todo.category;

      li.appendChild(selBox);
      li.appendChild(text);
      li.appendChild(badge);
    }

    /* ── 수정 모드 행 ── */

    function buildEditRow(li, todo) {
      var editInput = document.createElement('input');
      editInput.type      = 'text';
      editInput.className = 'edit-input';
      editInput.value     = todo.text;
      editInput.maxLength = 200;
      editInput.setAttribute('aria-label', '할 일 수정');

      var editSelect = document.createElement('select');
      editSelect.className = 'edit-select';
      editSelect.setAttribute('aria-label', '카테고리 선택');
      VALID_CATS.forEach(function(cat) {
        var opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        if (cat === todo.category) opt.selected = true;
        editSelect.appendChild(opt);
      });

      var hint = document.createElement('span');
      hint.className = 'edit-hint';
      hint.id        = 'edit-hint-' + todo.id;

      var actions = document.createElement('div');
      actions.className = 'todo-actions';

      var btnSave = document.createElement('button');
      btnSave.className   = 'btn-save';
      btnSave.textContent = '저장';
      btnSave.addEventListener('click', function() {
        saveEdit(todo.id, editInput.value.trim(), editSelect.value);
      });

      var btnCancel = document.createElement('button');
      btnCancel.className   = 'btn-cancel';
      btnCancel.textContent = '취소';
      btnCancel.addEventListener('click', cancelEdit);

      editInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter')  saveEdit(todo.id, editInput.value.trim(), editSelect.value);
        if (e.key === 'Escape') cancelEdit();
      });

      actions.appendChild(btnSave);
      actions.appendChild(btnCancel);
      li.appendChild(editInput);
      li.appendChild(editSelect);
      li.appendChild(hint);
      li.appendChild(actions);

      setTimeout(function() { editInput.focus(); }, 0);
    }

    /* ── 액션 함수 ── */

    function toggleTodo(id) {
      todos = todos.map(function(t) {
        return t.id === id ? Object.assign({}, t, { completed: !t.completed }) : t;
      });
      saveTodos(todos);
      renderTodos();
    }

    function startEdit(id) {
      selectionMode = false;
      selectedIds.clear();
      editingId = id;
      renderTodos();
    }

    function saveEdit(id, newText, newCategory) {
      if (newText === '') {
        var hint = document.getElementById('edit-hint-' + id);
        if (hint) hint.textContent = '내용을 입력해 주세요.';
        return;
      }
      todos = todos.map(function(t) {
        return t.id === id
          ? Object.assign({}, t, { text: newText, category: newCategory })
          : t;
      });
      editingId = null;
      saveTodos(todos);
      renderTodos();
    }

    function cancelEdit() {
      editingId = null;
      renderTodos();
    }

    function deleteTodo(id, text) {
      var label = text.length > 20 ? text.slice(0, 20) + '…' : text;
      if (!confirm('"' + label + '"\n\n삭제하시겠습니까?')) return;
      todos = todos.filter(function(t) { return t.id !== id; });
      if (editingId === id) editingId = null;
      selectedIds.delete(id);
      saveTodos(todos);
      renderTodos();
    }

    /* ── 일괄 삭제 ── */

    function deleteSelected() {
      /* selectedIds always reflects current selection — no need to iterate todos */
      var count = selectedIds.size;
      if (count === 0) return;
      if (!confirm(count + '개 항목을 삭제하시겠습니까?')) return;

      if (editingId && selectedIds.has(editingId)) editingId = null;
      todos = todos.filter(function(t) { return !selectedIds.has(t.id); });
      selectedIds.clear();

      if (todos.length === 0) selectionMode = false;

      saveTodos(todos);
      renderTodos();
    }

    function addTodo() {
      var text     = _elTodoInput.value.trim();
      var category = VALID_CATS.includes(_elCategorySelect.value) ? _elCategorySelect.value : '개인';

      if (text === '') {
        _elTodoInput.classList.add('invalid');
        _elHintText.style.display = 'block';
        _elTodoInput.focus();
        return;
      }

      _elTodoInput.classList.remove('invalid');
      _elHintText.style.display = 'none';

      todos.push(createTodo(text, category));
      saveTodos(todos);
      renderTodos();

      _elTodoInput.value = '';
      _elTodoInput.focus();
      userOverrideCat = false;
      _elCategorySelect.value = '개인';
      hideBadge();
    }

    /* ── 자동 분류 배지 헬퍼 ── */

    function showBadge() {
      _elAutoCatBadge.classList.add('visible');
    }

    function hideBadge() {
      _elAutoCatBadge.classList.remove('visible');
    }

    /* ── 이벤트 ── */

    document.getElementById('add-btn').addEventListener('click', addTodo);

    _elTodoInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    /* Timer handle for debounced auto-classification */
    var _detectTimer = null;

    _elTodoInput.addEventListener('input', function() {
      var text = this.value.trim();

      /* 유효성 상태 해제 */
      if (text !== '') {
        this.classList.remove('invalid');
        _elHintText.style.display = 'none';
      }

      /* 입력창 비워지면 수동 override 즉시 초기화 (debounce 불필요) */
      if (text === '') {
        clearTimeout(_detectTimer);
        userOverrideCat = false;
        _elCategorySelect.value = '개인';
        hideBadge();
        return;
      }

      /* 자동 카테고리 분류 — 120ms 디바운스로 빠른 타이핑 중 불필요한 실행 방지 */
      if (!userOverrideCat) {
        clearTimeout(_detectTimer);
        _detectTimer = setTimeout(function() {
          var detected = detectCategory(text);
          if (detected) {
            _elCategorySelect.value = detected;
            showBadge();
          } else {
            _elCategorySelect.value = '개인';
            hideBadge();
          }
        }, 120);
      }
    });

    /* 사용자가 직접 카테고리 변경 → 자동 분류 중단 */
    _elCategorySelect.addEventListener('change', function() {
      userOverrideCat = true;
      hideBadge();
    });

    document.getElementById('filter-area').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      activeFilter = btn.dataset.filter;
      editingId    = null;
      /* 필터 변경 시 선택 초기화 (모드 유지, 선택만 해제) */
      selectedIds.clear();
      renderTodos();
    });

    /* ── 초기 진입 ── */
    renderTodos();
  </script>
</body>
</html>
